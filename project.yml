# OpenGlasses XcodeGen spec (modular).
#
# The generated OpenGlasses.xcodeproj is NOT committed — regenerate it with:
#   ./Scripts/generate-xcodeproj.sh      (composes base + watch + tests + project.local.yml,
#                                          honours OPENGLASSES_SKIP_WATCH / _SKIP_TESTS)
# or, for the full project without personal signing:
#   xcodegen generate
#
# Personal signing (DEVELOPMENT_TEAM, personal entitlements/Info) goes in project.local.yml —
# copy project.local.yml.example. See README "Local development setup".
include:
  - project.base.yml
  - project.watch.yml
  - project.tests.yml
