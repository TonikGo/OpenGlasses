targets:
  OpenGlassesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenGlassesTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app.tests
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenGlasses.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OpenGlasses"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: OpenGlasses

schemes:
  OpenGlasses:
    test:
      config: Debug
      targets:
        - OpenGlassesTests
      commandLineArguments:
        "-ApplePersistenceIgnoreState": "YES"
